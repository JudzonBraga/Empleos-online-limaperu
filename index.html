<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae - Directorio Profesional</title>
     <link rel="stylesheet" href="./style.css">
    </head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">✨ Profesionales CV</div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Profesionales</a></li>
            <li><a href="#">Empresas</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <!-- Slideshow -->
    <div class="slideshow-container">
        <img class="slide fade active-slide" src="https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" alt="Profesionales trabajando">
        <img class="slide fade" src="https://images.pexels.com/photos/3184423/pexels-photo-3184423.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" alt="Reunión de negocios">
        <img class="slide fade" src="https://images.pexels.com/photos/3194519/pexels-photo-3194519.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" alt="Equipo trabajando">
    </div>

    <!-- Contenido principal -->
    <div class="main-container">
        <!-- Sidebar profesiones con BUSCADOR -->
        <div class="professions-sidebar">
            <h3>Profesiones</h3>
            
            <div class="profession-search">
                <input type="text" class="search-input" id="professionSearch" placeholder="🔍 Buscar profesión...">
            </div>
            
            <ul class="professions-list" id="professionsList"></ul>
        </div>

        <!-- Grid CVs -->
        <div class="cvs-grid-container">
            <div class="loading" id="loading">Cargando profesionales...</div>
            <div class="cvs-grid" id="cvsGrid"></div>
            
            <!-- Contenedor de paginación -->
            <div class="pagination-container" id="paginationContainer"></div>
        </div>
    </div>

    <!-- Modal CV -->
    <div id="cvModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2024 Directorio Profesional CV</p>
            <p>Encuentra los mejores profesionales para tu empresa</p>
            <p style="font-size: 0.9rem; color: #718096;">✨ Diseñado para conectar talento con oportunidades ✨</p>
        </div>
    </footer>
    <script src="./javascript.js"></script>
</body>
</html>
